<app-navbar></app-navbar>

<div class="container mt-4">

  <div class="card shadow">

    <div class="card-header bg-primary text-white">
      {{ isEditMode ? 'Edit Employee' : 'Add Employee' }}
    </div>

    <div class="card-body">

      <form [formGroup]="employeeForm"
            (ngSubmit)="saveEmployee()">

        <div class="row">

          <div class="col-md-6 mb-3">
            <label>Full Name</label>
            <input
              type="text"
              class="form-control"
              formControlName="fullName">

            <small class="text-danger"
              *ngIf="employeeForm.get('fullName')?.touched &&
                     employeeForm.get('fullName')?.invalid">
              Name is required
            </small>
          </div>

          <div class="col-md-6 mb-3">
            <label>Email</label>
            <input
              type="email"
              class="form-control"
              formControlName="email">
          </div>

          <div class="col-md-6 mb-3">
            <label>Phone</label>
            <input
              type="text"
              class="form-control"
              formControlName="phone">
          </div>

          <div class="col-md-6 mb-3">
            <label>Gender</label>

            <select
              class="form-select"
              formControlName="gender">

              <option value="">Select Gender</option>
              <option>Male</option>
              <option>Female</option>

            </select>
          </div>

          <!-- ADD DEPARTMENT DROPDOWN HERE -->

  <div class="col-md-6 mb-3">
    <label>Department</label>

    <select
      class="form-select"
      formControlName="departmentId">

      <option value="">
        Select Department
      </option>

      <option
        *ngFor="let dept of departments"
        [value]="dept.departmentId">

        {{ dept.departmentName }}

      </option>

    </select>
  </div>

  <!-- ADD DESIGNATION DROPDOWN HERE -->

  <div class="col-md-6 mb-3">
    <label>Designation</label>

    <select
      class="form-select"
      formControlName="designationId">

      <option value="">
        Select Designation
      </option>

      <option
        *ngFor="let des of designations"
        [value]="des.designationId">

        {{ des.designationName }}

      </option>

    </select>
  </div>

          <div class="col-md-6 mb-3">
            <label>Salary</label>

            <input
              type="number"
              class="form-control"
              formControlName="salary">
          </div>

          <div class="col-md-6 mb-3">
            <label>Employee Type</label>

            <select
              class="form-select"
              formControlName="employeeType">

              <option value="">Select Type</option>
              <option>Permanent</option>
              <option>Contract</option>

            </select>
          </div>

        </div>

        <button
          class="btn btn-success"
          [disabled]="employeeForm.invalid">
          Save Employee
        </button>

      </form>

    </div>

  </div>

</div>
