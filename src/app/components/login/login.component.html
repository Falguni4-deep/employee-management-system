<div class="container">

  <div class="row justify-content-center align-items-center vh-100">

    <div class="col-md-5">

      <div class="card p-4 shadow">

        <h2 class="text-center text-primary">
          Employee Management System
        </h2>

        <p class="text-center text-muted">
          Manage Employees Efficiently
        </p>

        <div class="card-body">

          <form>

            <div class="mb-3">
              <label>Email</label>
              <input type="email" class="form-control" name="email" [(ngModel)]="email">
            </div>

            <div class="mb-3">
              <label>Password</label>
              <input type="password" class="form-control" name="password" [(ngModel)]="password">
            </div>

            <div
                class="text-danger mb-2"
                *ngIf="errorMessage">

                {{ errorMessage }}

            </div>

            <button class="btn btn-primary w-100" type="button" (click)="login()">
              Login
            </button>

          </form>

        </div>

      </div>

    </div>

  </div>

</div>
